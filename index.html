<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undersales - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1b3861 0%, #0f1f3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        .logo h1 {
            color: #1b3861;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .logo p {
            color: #6b7280;
            font-size: 15px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            color: #374151;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1b3861;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: #1b3861;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: #0f1f3a;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(27, 56, 97, 0.3);
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #991b1b;
        }
        .error.show {
            display: block;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #6b7280;
        }
        .info-box {
            background: #e3ebf5;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1b3861;
            border-left: 4px solid #1b3861;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>UNDERSALES</h1>
            <p>Plateforme de reporting client</p>
        </div>
        
        <div class="info-box">
            🔐 Accès sécurisé réservé à l'équipe commerciale
        </div>
        
        <div class="error" id="error">
            ❌ Email non autorisé. Contactez votre administrateur.
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email professionnel</label>
                <input type="email" id="emailInput" required placeholder="prenom.nom@undersales.ch" autocomplete="email">
            </div>
            <button type="submit" class="btn-login">🔓 Se connecter</button>
        </form>
        
        <div class="footer-text">
            Undersales Sàrl © 2026<br>
            <small>Cours des Bastions 13, 1205 Genève</small>
        </div>
    </div>

    <script>
        // ========================================
        // LISTE DES EMAILS AUTORISÉS
        // Modifie cette liste pour ajouter/retirer des accès
        // ========================================
        const AUTHORIZED_EMAILS = [
            'anthony@undersales.ch',
            'anthony.maquet@undersales.ch',
            'hugo@undersales.ch',
            'hugo.jorda@undersales.ch',
            'karim@undersales.ch',
            'karim.mihoubi@undersales.ch',
            // Ajoute d'autres emails ici au format :
            // 'prenom.nom@undersales.ch',
        ];

        // Gestion de la soumission du formulaire
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('emailInput').value.toLowerCase().trim();
            const errorDiv = document.getElementById('error');
            
            if (AUTHORIZED_EMAILS.includes(email)) {
                // Email autorisé - sauvegarder et rediriger
                localStorage.setItem('undersales_user', email);
                localStorage.setItem('undersales_login_time', new Date().toISOString());
                errorDiv.classList.remove('show');
                
                // Animation de succès puis redirection
                document.querySelector('.btn-login').textContent = '✅ Connexion réussie...';
                document.querySelector('.btn-login').style.background = '#22c55e';
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
                
            } else {
                // Email non autorisé - afficher l'erreur
                errorDiv.classList.add('show');
                document.getElementById('emailInput').value = '';
                document.getElementById('emailInput').focus();
            }
        });
    </script>
</body>
</html>

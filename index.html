<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undersales - Reporting</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --blue: #1b3861;
            --blue-dark: #0f1f3a;
            --blue-light: #e3ebf5;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1b3861 0%, #0f1f3a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: var(--blue); font-size: 32px; font-weight: 700; margin-bottom: 5px; }
        .header p { color: var(--gray-600); font-size: 14px; }
        .stat-box {
            background: var(--blue-light);
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid var(--blue);
        }
        .stat-label { font-size: 12px; color: var(--gray-600); font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 28px; color: var(--blue); font-weight: 700; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 10px;
        }
        .btn-primary { background: var(--blue); color: white; }
        .btn-primary:hover { background: var(--blue-dark); }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700); }
        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .sidebar {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            height: fit-content;
        }
        .sidebar h3 { color: var(--gray-900); font-size: 18px; margin-bottom: 20px; }
        .template-item {
            padding: 15px;
            background: var(--gray-50);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .template-item:hover { background: var(--blue-light); }
        .form-container {
            background: white;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .form-section {
            margin-bottom: 35px;
            padding-bottom: 35px;
            border-bottom: 2px solid var(--gray-200);
        }
        .form-section:last-child { border-bottom: none; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .section-title { display: flex; align-items: center; gap: 12px; }
        .section-icon {
            width: 40px;
            height: 40px;
            background: var(--blue-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
            font-size: 20px;
        }
        .section-title h2 { color: var(--gray-900); font-size: 20px; font-weight: 700; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-grid.three { grid-template-columns: repeat(3, 1fr); }
        .form-grid.four { grid-template-columns: repeat(4, 1fr); }
        .form-grid.five { grid-template-columns: repeat(5, 1fr); }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { color: var(--gray-700); font-size: 14px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--blue);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .rdv-card {
            background: var(--gray-50);
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .rdv-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--gray-200);
        }
        .rdv-card-title { font-size: 16px; font-weight: 700; color: var(--blue); }
        .score-selector { display: flex; gap: 10px; margin-top: 10px; }
        .score-option {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .score-option:hover { border-color: var(--blue); }
        .score-option.selected { background: var(--blue); color: white; border-color: var(--blue); }
        .score-emoji { font-size: 20px; }
        .score-label { font-size: 11px; font-weight: 600; margin-top: 5px; }
        .action-buttons { display: flex; gap: 15px; margin-top: 30px; padding-top: 30px; border-top: 2px solid var(--gray-200); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; padding: 30px; max-width: 500px; width: 90%; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; }
        #pdfPreview { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow: auto; padding: 40px; }
        .pdf-close { position: fixed; top: 20px; right: 20px; background: white; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; z-index: 1001; border: none; }
        .pdf-page { width: 210mm; height: 297mm; background: white; margin: 0 auto 20px; position: relative; overflow: hidden; page-break-after: always; }
        .pdf-header { background: var(--blue); color: white; padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; }
        .pdf-header h1 { font-size: 24px; margin-bottom: 5px; }
        .pdf-header p { font-size: 13px; opacity: 0.9; }
        .pdf-logo { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
        .pdf-meta-bar { background: white; padding: 20px 40px; display: flex; justify-content: space-between; border-bottom: 3px solid var(--blue); }
        .pdf-meta-item { text-align: center; }
        .pdf-meta-label { font-size: 10px; color: var(--gray-600); font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .pdf-meta-value { font-size: 15px; color: var(--blue); font-weight: 700; }
        .pdf-content { padding: 30px 40px; }
        .pdf-section { margin-bottom: 25px; }
        .pdf-section-title { color: var(--blue); font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; padding-bottom: 8px; border-bottom: 2px solid var(--blue-light); }
        .pdf-section-icon { width: 28px; height: 28px; background: var(--blue-light); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .pdf-info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .pdf-info-item { background: var(--gray-50); padding: 10px; border-radius: 6px; border-left: 3px solid var(--blue); }
        .pdf-info-label { font-size: 9px; color: var(--gray-600); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
        .pdf-info-value { font-size: 12px; color: var(--gray-900); font-weight: 600; }
        .pdf-call-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .pdf-call-stat { background: var(--blue-light); padding: 12px; border-radius: 8px; text-align: center; border: 2px solid var(--blue); }
        .pdf-call-stat-value { font-size: 22px; color: var(--blue); font-weight: 700; margin-bottom: 5px; }
        .pdf-call-stat-label { font-size: 9px; color: var(--gray-700); font-weight: 600; text-transform: uppercase; }
        .pdf-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .pdf-chart { background: white; border: 2px solid var(--gray-200); border-radius: 10px; padding: 15px; }
        .pdf-chart-title { font-size: 12px; font-weight: 700; color: var(--gray-900); text-align: center; margin-bottom: 10px; }
        .donut-chart-container { width: 160px; height: 160px; margin: 0 auto; position: relative; }
        .chart-legend { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .legend-color { width: 14px; height: 14px; border-radius: 3px; }
        .legend-label { flex: 1; color: var(--gray-700); }
        .legend-value { font-weight: 700; color: var(--gray-900); }
        .pdf-text-block { background: var(--gray-50); padding: 12px; border-radius: 6px; line-height: 1.5; color: var(--gray-700); font-size: 11px; margin-top: 8px; }
        .pdf-score-visual { margin: 12px 0; }
        .pdf-score-bar { height: 30px; background: var(--gray-200); border-radius: 6px; position: relative; overflow: hidden; }
        .pdf-score-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--blue); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 12px; }
        .pdf-footer { position: absolute; bottom: 0; left: 0; right: 0; background: var(--gray-900); color: white; padding: 12px 40px; font-size: 9px; display: flex; justify-content: space-between; }
        .monthly-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .monthly-table th { background: var(--blue); color: white; padding: 8px; text-align: left; font-size: 10px; font-weight: 700; border: 1px solid var(--blue); }
        .monthly-table td { padding: 8px; font-size: 10px; border: 1px solid var(--gray-200); background: white; }
        .monthly-table tr:nth-child(even) td { background: var(--gray-50); }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; text-align: center; }
        .status-excellent { background: #d1fae5; color: #065f46; }
        .status-good { background: #dbeafe; color: #1e40af; }
        .status-medium { background: #fef3c7; color: #92400e; }
        .status-noshow { background: #fee2e2; color: #991b1b; }
        .status-upcoming { background: #e0e7ff; color: #3730a3; }
        .hide { display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .stat-item { background: var(--gray-50); padding: 8px; border-radius: 6px; text-align: center; }
        .stat-item-value { font-size: 18px; font-weight: 700; color: var(--blue); }
        .stat-item-label { font-size: 9px; color: var(--gray-700); font-weight: 600; text-transform: uppercase; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>UNDERSALES</h1>
                <p>Plateforme de reporting</p>
            </div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <div class="stat-box">
                    <div class="stat-label">RDV ce mois</div>
                    <div class="stat-value" id="monthRdvCount">0</div>
                </div>
                <div>
                    <button class="btn btn-secondary" onclick="toggleReportMode()" id="toggleBtn">📅 Rapport Mensuel</button>
                    <button class="btn btn-primary" onclick="newReport()">➕ Nouveau CR</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <h3>📋 Templates</h3>
                <div id="templates"></div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="saveTemplate()">💾 Sauvegarder</button>
            </div>

            <div class="form-container">
                <form id="form">
                    <div class="form-section">
                        <div class="section-header">
                            <div class="section-title">
                                <div class="section-icon">📅</div>
                                <h2>Session</h2>
                            </div>
                        </div>
                        <div class="form-grid three">
                            <div class="form-group">
                                <label>Mois *</label>
                                <select id="month" required>
                                    <option value="">Sélectionner...</option>
                                    <option value="1">Mois N°1</option>
                                    <option value="2">Mois N°2</option>
                                    <option value="3">Mois N°3</option>
                                    <option value="4">Mois N°4</option>
                                    <option value="5">Mois N°5</option>
                                    <option value="6">Mois N°6</option>
                                    <option value="7">Mois N°7</option>
                                    <option value="8">Mois N°8</option>
                                    <option value="9">Mois N°9</option>
                                    <option value="10">Mois N°10</option>
                                    <option value="11">Mois N°11</option>
                                    <option value="12">Mois N°12</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Session *</label>
                                <input type="text" id="session" required placeholder="Ex: N°8">
                            </div>
                            <div class="form-group">
                                <label>Date *</label>
                                <input type="date" id="date" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-header">
                            <div class="section-title">
                                <div class="section-icon">🏢</div>
                                <h2>Client</h2>
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Nom *</label>
                                <input type="text" id="clientName" required>
                            </div>
                            <div class="form-group">
                                <label>Contact</label>
                                <input type="text" id="contactName">
                            </div>
                            <div class="form-group">
                                <label>Adresse</label>
                                <input type="text" id="address">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="email">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-header">
                            <div class="section-title">
                                <div class="section-icon">📊</div>
                                <h2>Data calls</h2>
                            </div>
                        </div>
                        <div class="form-grid four">
                            <div class="form-group">
                                <label>Total calls</label>
                                <input type="number" id="totalCalls" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>Connectés</label>
                                <input type="number" id="connected" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>RDV pris</label>
                                <input type="number" id="rdvTaken" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>Conversion</label>
                                <input type="text" id="conversion" readonly>
                            </div>
                        </div>
                        <h3 style="color: var(--blue); font-size: 16px; margin: 20px 0 15px; font-weight: 700;">Stats prospection</h3>
                        <div class="form-grid five">
                            <div class="form-group">
                                <label>Intéressés</label>
                                <input type="number" id="interested" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>Non intéressés</label>
                                <input type="number" id="notInterested" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>À nurturer</label>
                                <input type="number" id="toNurture" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>Qualifiés</label>
                                <input type="number" id="qualified" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>En attente</label>
                                <input type="number" id="pending" value="0" min="0">
                            </div>
                        </div>
                        <div class="form-grid" style="margin-top: 15px;">
                            <div class="form-group">
                                <label>Résultats</label>
                                <textarea id="results"></textarea>
                            </div>
                            <div class="form-group">
                                <label>Notes</label>
                                <textarea id="notes"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="form-section" id="sessionSection">
                        <div class="section-header">
                            <div class="section-title">
                                <div class="section-icon">📝</div>
                                <h2>Rendez-vous</h2>
                            </div>
                            <button type="button" class="btn btn-secondary" onclick="addRdv()">➕ Ajouter</button>
                        </div>
                        <div id="rdvs"></div>
                    </div>

                    <div class="form-section hide" id="monthlySection">
                        <div class="section-header">
                            <div class="section-title">
                                <div class="section-icon">📋</div>
                                <h2>RDV du mois</h2>
                            </div>
                            <button type="button" class="btn btn-secondary" onclick="addMonthlyRdv()">➕ Ajouter</button>
                        </div>
                        <table class="monthly-table">
                            <thead>
                                <tr><th>Prospect</th><th>Date</th><th>État</th><th style="width:50px;">Action</th></tr>
                            </thead>
                            <tbody id="monthlyRdvs"></tbody>
                        </table>
                    </div>

                    <div class="form-section hide" id="nurtureSection">
                        <div class="section-header">
                            <div class="section-title">
                                <div class="section-icon">🌱</div>
                                <h2>À nurturer</h2>
                            </div>
                            <button type="button" class="btn btn-secondary" onclick="addNurture()">➕ Ajouter</button>
                        </div>
                        <table class="monthly-table">
                            <thead>
                                <tr><th>Prospect</th><th>Mois relance</th><th style="width:50px;">Action</th></tr>
                            </thead>
                            <tbody id="nurtures"></tbody>
                        </table>
                    </div>

                    <div class="action-buttons">
                        <button type="button" class="btn btn-primary" onclick="generatePDF()">📄 Générer PDF</button>
                        <button type="button" class="btn btn-secondary" onclick="preview()">👁️ Prévisualiser</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Sauvegarder template</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="templateName">
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="confirmSave()">Sauvegarder</button>
                <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
            </div>
        </div>
    </div>

    <div id="pdfPreview">
        <button class="pdf-close" onclick="closePreview()">✕ Fermer</button>
        <div id="pdfContent"></div>
    </div>

    <script>
        let rdvCount = 0;
        let monthlyRdvCount = 0;
        let nurtureCount = 0;
        let isMonthly = false;
        let templates = JSON.parse(localStorage.getItem('templates') || '[]');
        let monthHistory = JSON.parse(localStorage.getItem('monthHistory') || '[]');

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            renderTemplates();
            addRdv();
            document.getElementById('totalCalls').addEventListener('input', calcConversion);
            document.getElementById('rdvTaken').addEventListener('input', calcConversion);
        });

        function calcConversion() {
            const total = parseInt(document.getElementById('totalCalls').value) || 0;
            const rdv = parseInt(document.getElementById('rdvTaken').value) || 0;
            document.getElementById('conversion').value = total > 0 ? ((rdv / total) * 100).toFixed(1) + '%' : '';
        }

        function toggleReportMode() {
            isMonthly = !isMonthly;
            const btn = document.getElementById('toggleBtn');
            if (isMonthly) {
                document.getElementById('sessionSection').classList.add('hide');
                document.getElementById('monthlySection').classList.remove('hide');
                document.getElementById('nurtureSection').classList.remove('hide');
                btn.textContent = '📝 Rapport Session';
                btn.classList.remove('btn-secondary');
                btn.classList.add('btn-primary');
            } else {
                document.getElementById('sessionSection').classList.remove('hide');
                document.getElementById('monthlySection').classList.add('hide');
                document.getElementById('nurtureSection').classList.add('hide');
                btn.textContent = '📅 Rapport Mensuel';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-secondary');
            }
        }

        function newReport() {
            if (!confirm('Nouveau CR ? Les infos client seront conservées.')) return;
            const client = document.getElementById('clientName').value;
            const contact = document.getElementById('contactName').value;
            const address = document.getElementById('address').value;
            const email = document.getElementById('email').value;
            document.getElementById('form').reset();
            document.getElementById('rdvs').innerHTML = '';
            rdvCount = 0;
            document.getElementById('clientName').value = client;
            document.getElementById('contactName').value = contact;
            document.getElementById('address').value = address;
            document.getElementById('email').value = email;
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            addRdv();
        }

        function addRdv() {
            rdvCount++;
            document.getElementById('rdvs').insertAdjacentHTML('beforeend', `
                <div class="rdv-card" id="rdv${rdvCount}">
                    <div class="rdv-card-header">
                        <div class="rdv-card-title">RDV N°${rdvCount}</div>
                        <button type="button" class="btn btn-secondary" onclick="removeRdv(${rdvCount})">🗑️</button>
                    </div>
                    <div class="form-grid">
                        <div class="form-group"><label>Entreprise *</label><input type="text" id="r${rdvCount}company" required></div>
                        <div class="form-group"><label>Contact</label><input type="text" id="r${rdvCount}contact"></div>
                        <div class="form-group"><label>Fonction</label><input type="text" id="r${rdvCount}job"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="r${rdvCount}email"></div>
                        <div class="form-group"><label>Téléphone</label><input type="tel" id="r${rdvCount}phone"></div>

            const name = document.getElementById('templateName').value.trim();
            if (!name) return alert('Entrez un nom');
            templates.push({
                id: Date.now(),
                name,
                clientName: document.getElementById('clientName').value,
                contactName: document.getElementById('contactName').value,
                address: document.getElementById('address').value,
                email: document.getElementById('email').value
            });
            localStorage.setItem('templates', JSON.stringify(templates));
            renderTemplates();

            const container = document.getElementById('templates');
            if (templates.length === 0) {

                return;
            }
            container.innerHTML = templates.map(t => `
                <div class="template-item" onclick="loadTemplate(${t.id})">
                    <div style="font-weight:600;margin-bottom:5px;">${t.name}</div>
                    <div style="font-size:12px;color:var(--gray-600);">${t.clientName}</div>
                </div>
            `).join('');
        }

            const t = templates.find(x => x.id === id);
            if (!t) return;
            document.getElementById('clientName').value = t.clientName;
            document.getElementById('contactName').value = t.contactName;
            document.getElementById('address').value = t.address;
            document.getElementById('email').value = t.email;
        }

        function getData() {
            const rdvs = [];
            document.querySelectorAll('.rdv-card').forEach(card => {
                const id = card.id.replace('rdv', '');
                const company = document.getElementById(`r${id}company`)?.value;
                if (company) rdvs.push({
                    company, contact: document.getElementById(`r${id}contact`)?.value || '',
                    job: document.getElementById(`r${id}job`)?.value || '',
                    email: document.getElementById(`r${id}email`)?.value || '',
                    phone: document.getElementById(`r${id}phone`)?.value || '',
                    address: document.getElementById(`r${id}address`)?.value || '',
                    date: document.getElementById(`r${id}date`)?.value || '',
                    type: document.getElementById(`r${id}type`)?.value || '',
                    score: document.getElementById(`r${id}score`)?.value || '',
                    situation: document.getElementById(`r${id}situation`)?.value || '',
                    details: document.getElementById(`r${id}details`)?.value || ''
                });
            });
            const monthlyRdvs = [];
            document.querySelectorAll('#monthlyRdvs tr').forEach(row => {
                const id = row.id.replace('mr', '');
                const name = document.getElementById(`mr${id}name`)?.value;
                if (name) monthlyRdvs.push({
                    name, date: document.getElementById(`mr${id}date`)?.value || '',
                    status: document.getElementById(`mr${id}status`)?.value || ''
                });
            });
            const nurtures = [];
            document.querySelectorAll('#nurtures tr').forEach(row => {
                const id = row.id.replace('n', '');
                const name = document.getElementById(`n${id}name`)?.value;
                if (name) nurtures.push({
                    name, month: document.getElementById(`n${id}month`)?.value || ''
                });

                <circle cx="80" cy="80" r="${r}" fill="none" stroke="#1b3861" stroke-width="16" stroke-dasharray="${c}" stroke-dashoffset="${o}" transform="rotate(-90 80 80)" stroke-linecap="round"/>
                <text x="80" y="75" text-anchor="middle" font-size="24" font-weight="bold" fill="#1b3861">${pct.toFixed(1)}%</text>

            document.getElementById('pdfPreview').style.display = 'none';

        async function generatePDF() {
            const d = getData();
            if (!d.clientName) return alert('Entrez le nom du client');

            const container = document.createElement('div');
            container.style.position = 'absolute';
            container.style.left = '-9999px';
            container.innerHTML = genPDF(d, monthHistory);
            document.body.appendChild(container);

            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pages = container.querySelectorAll('.pdf-page');

                for (let i = 0; i < pages.length; i++) {
                    if (i > 0) pdf.addPage();
                    const canvas = await html2canvas(pages[i], {
                        scale: 2,
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#ffffff'
                    });
                    const imgData = canvas.toDataURL('image/png');
                    pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
                }

                const name = d.isMonthly
                    ? `Reporting_Mensuel_${d.clientName}_Mois_${d.month}.pdf`
                    : `Reporting_${d.clientName}_Mois_${d.month}_Session_${d.session}.pdf`;
                pdf.save(name);
                alert('PDF généré !');
            } catch (error) {
                console.error(error);
                alert('Erreur génération PDF');
            } finally {
                document.body.removeChild(container);
            }
        }
    </script>
</body>
